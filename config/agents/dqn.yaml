algo: dqn

# Replay / sampling
replay:
  type: uniform
  capacity: 5000
  batch_size: 32
  eps: 1.0e-6
  sa_mitigation:
    enabled: false
    method: dqn

# Exploration
epsilon:
  start: 1.0
  end: 0.05
  decay_steps: 50000

# Optimization
optimizer:
  lr: 1.0e-3
  weight_decay: 0

# DQN / DDQN specifics
gamma: 0.0  # 1.0
handle_time_limit_as_terminal: true
train_freq: 1              # gradient step each env step
learning_starts: 100
gradient_steps: 1
max_grad_norm: 10.0

target_update:
  interval: 10
  tau: 1

# Network
model:
  type: mlp
  activation: relu
  hidden_sizes: [32]
  conv_channels: [16, 32]
  fc_hidden: 128

# Logging and eVal
log_interval_steps: 1000
eval_episodes: 20
