algo: dqn

# Replay / sampling
replay:
  type: per
  capacity: 5000 # 200000
  batch_size: 32 # 128
  eps: 1.0e-6
  alpha: 0.6
  beta: 0.4
  beta_anneal_steps: 20000 # 35000

  sa_mitigation:
    enabled: false
    method: none   # avg | other | none
    include_self: false
    min_group: 1
    max_group: 16 # 64
    update_all_siblings: true

# Exploration
epsilon:
  start: 1.0
  end: 0.05
  decay_steps: 15000 # 130000

# Optimization
optimizer:
  lr: 1.0e-3 # 3.0e-4
  weight_decay: 0

# DQN / DDQN specifics
gamma: 1.0 # 0.99
handle_time_limit_as_terminal: true
train_freq: 1              # gradient step each env step
learning_starts: 100 # 10000
gradient_steps: 1
max_grad_norm: 10.0

target_update:
  interval: 10 # 1
  tau: 1 # 0.01

# Network
model:
  type: mlp
  hidden_sizes: [32] # [128, 128]
  activation: relu
  conv_channels: [16, 32]
  fc_hidden: 128

# Logging and eVal
log_interval_steps: 300
eval_episodes: 50
