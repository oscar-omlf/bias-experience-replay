algo: dqn

# Replay / sampling
replay:
  type: per
  capacity: 200000
  batch_size: 128
  eps: 1.0e-6
  alpha: 0.6
  beta: 0.4
  beta_anneal_steps: 80000

  sa_mitigation:
    enabled: false
    method: model   # avg | other | model |none
    include_self: true
    min_group: 1
    max_group: 64
    update_all_siblings: false

# Exploration
epsilon:
  start: 1.0
  end: 0.05
  decay_steps: 130000

# Optimization
optimizer:
  lr: 3.0e-4
  weight_decay: 0

# DQN / DDQN specifics
gamma: 0.99
handle_time_limit_as_terminal: true
train_freq: 1              # gradient step each env step
learning_starts: 10000
gradient_steps: 1
max_grad_norm: 4.0

target_update:
  interval: 1
  tau: 0.01

# Network
model:
  type: mlp
  hidden_sizes: [128, 128]
  activation: relu
  conv_channels: [16, 32]
  fc_hidden: 128

# Logging and eVal
log_interval_steps: 2000
eval_episodes: 20
